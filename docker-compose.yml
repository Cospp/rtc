services:
  redis:
    image: redis:7
    container_name: rtc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  session-control:
    build:
      context: .
      dockerfile: session_control/Dockerfile
    image: rtc-session-control:dev
    pull_policy: never
    container_name: rtc-session-control
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn session_control.app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    image: rtc-relay:dev
    pull_policy: never
    container_name: rtc-relay
    environment:
      RELAY_ID: relay-1
      RELAY_INTERNAL_ENDPOINT: relay:8080
      RELAY_PUBLIC_ENDPOINT: localhost:8080
      RELAY_MAX_SESSIONS: "10"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    image: rtc-worker:dev
    pull_policy: never
    container_name: rtc-worker-1
    environment:
      WORKER_ID: worker-1
      WORKER_HOST: worker-1
      WORKER_PORT: "9000"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "9000:9000"
    volumes:
      - .:/app
    command: uvicorn worker.app.main:app --host 0.0.0.0 --port 9000 --reload
    depends_on:
      redis:
        condition: service_healthy
      relay:
        condition: service_started
    restart: unless-stopped

  worker-2:
    image: rtc-worker:dev
    pull_policy: never
    container_name: rtc-worker-2
    environment:
      WORKER_ID: worker-2
      WORKER_HOST: worker-2
      WORKER_PORT: "9000"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "9001:9000"
    volumes:
      - .:/app
    command: uvicorn worker.app.main:app --host 0.0.0.0 --port 9000 --reload
    depends_on:
      redis:
        condition: service_healthy
      worker-1:
        condition: service_started
    restart: unless-stopped

  worker-3:
    image: rtc-worker:dev
    pull_policy: never
    container_name: rtc-worker-3
    environment:
      WORKER_ID: worker-3
      WORKER_HOST: worker-3
      WORKER_PORT: "9000"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "9002:9000"
    volumes:
      - .:/app
    command: uvicorn worker.app.main:app --host 0.0.0.0 --port 9000 --reload
    depends_on:
      redis:
        condition: service_healthy
      worker-1:
        condition: service_started
    restart: unless-stopped
