apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-control
  namespace: rtc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-control
  template:
    metadata:
      labels:
        app: session-control
    spec:
      serviceAccountName: session-control
      containers:
        - name: session-control
          image: rtc-session-control:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: KUBERNETES_NAMESPACE
              value: rtc
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: session-control
  namespace: rtc
spec:
  selector:
    app: session-control
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: session-control
  namespace: rtc

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: session-control-pod-killer
  namespace: rtc
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: session-control-pod-killer
  namespace: rtc
subjects:
  - kind: ServiceAccount
    name: session-control
    namespace: rtc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: session-control-pod-killer
